version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rpcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
